<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Chrystal!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background: radial-gradient(ellipse at 50% 40%, #2d0a3e 0%, #1a0528 55%, #0d0118 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family: Georgia, serif;
    padding:2rem 1rem;
    overflow:hidden; position:relative; cursor:default;
  }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #bgCanvas { z-index:0; }
  #fxCanvas { z-index:4; }
  .scene { width:100%; max-width:680px; position:relative; display:flex; flex-direction:column; align-items:center; z-index:2; }
  .card {
    background: rgba(30,5,50,0.78);
    border-radius:32px;
    border:1.5px solid rgba(220,120,255,0.35);
    padding:2.8rem 3.5rem 2.2rem;
    text-align:center; position:relative; z-index:2;
    max-width:500px; width:100%;
    box-shadow: 0 0 60px rgba(180,60,255,0.2), 0 0 120px rgba(180,60,255,0.1), inset 0 0 40px rgba(180,60,255,0.07);
  }
  .title-wrap { position:relative; display:inline-block; overflow:hidden; }
  .title {
    font-size:clamp(1.9rem,5vw,3rem); font-weight:bold; line-height:1.18;
    background: linear-gradient(135deg, #ffd6f0 0%, #ff80d5 35%, #c97dff 65%, #ffd6f0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 18px rgba(220,100,255,0.55));
    position:relative;
  }
  .shimmer-bar {
    position:absolute; top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    animation: shimmerSweep 3.2s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes shimmerSweep { 0%{left:-80%} 60%{left:130%} 100%{left:130%} }
  .subtitle {
    font-size:clamp(0.9rem,2.4vw,1.05rem); color:#e8b4f8; font-style:italic;
    margin-top:0.85rem; line-height:1.55;
    text-shadow:0 0 12px rgba(200,100,255,0.4); min-height:2.5em;
  }
  .cursor { display:inline-block; width:2px; height:1em; background:#e8b4f8; margin-left:2px; vertical-align:middle; animation:blink 0.75s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .wish-btn {
    margin-top:1.6rem;
    padding:0.65rem 2rem;
    border-radius:999px;
    border:1.5px solid rgba(220,120,255,0.6);
    background:rgba(180,60,255,0.15);
    color:#f0c0ff;
    font-family:Georgia,serif; font-size:1rem; font-style:italic;
    cursor:pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow:0 0 18px rgba(180,60,255,0.2);
  }
  .wish-btn:hover { background:rgba(180,60,255,0.32); box-shadow:0 0 32px rgba(220,100,255,0.45); transform:scale(1.04); }
  .wish-btn:active { transform:scale(0.97); }
  .wish-msg {
    margin-top:1rem; font-size:1rem; color:#ffd6f0; font-style:italic;
    min-height:1.5em; text-shadow:0 0 16px rgba(255,180,255,0.7);
    opacity:0; transition:opacity 0.5s;
  }
  .wish-msg.show { opacity:1; }
  .flower-row { display:flex; justify-content:center; margin-bottom:-12px; }
  .flower-row.bottom { margin-top:-12px; margin-bottom:0; }
  .fl { transition: filter 0.25s, transform 0.25s; cursor:default; }
  .fl:hover { filter: drop-shadow(0 0 14px rgba(255,160,255,0.9)) drop-shadow(0 0 28px rgba(200,80,255,0.6)); transform:scale(1.13) translateY(-4px); }
</style>

<script>
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const fxC = document.getElementById('fxCanvas');
const fx = fxC.getContext('2d');

function resize() {
  bgC.width = fxC.width = window.innerWidth;
  bgC.height = fxC.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length:130}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.6,
  phase: Math.random() * Math.PI * 2,
  speed: 0.005 + Math.random() * 0.012
}));

function drawBg(t) {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  for (const s of stars) {
    const a = 0.25 + 0.55 * Math.abs(Math.sin(s.phase + t * s.speed));
    bgX.beginPath();
    bgX.arc(s.x * bgC.width, s.y * bgC.height, s.r, 0, Math.PI * 2);
    bgX.fillStyle = `rgba(255,210,255,${a})`;
    bgX.fill();
  }
}

const particles = [];
const confettiColors = ['#f472b6','#c084fc','#fb7185','#fbbf24','#34d399','#60a5fa','#f9a8d4','#a78bfa','#fde047'];

function spawnConfetti(cx, cy, count, isClick) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = isClick ? (1.5 + Math.random() * 4) : (3 + Math.random() * 7);
    const col = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    const type = Math.random() > 0.4 ? 'rect' : 'circle';
    particles.push({
      x: cx, y: cy, vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (isClick ? 1 : 3),
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.2,
      w: 4 + Math.random() * 7, h: 3 + Math.random() * 5,
      color: col, life: 1, decay: 0.012 + Math.random() * 0.018, gravity: 0.08, type,
    });
  }
}

function spawnPetalBurst(cx, cy) {
  const petalCols = ['#f9a8d4','#c084fc','#fb7185','#f472b6','#e879f9'];
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.12,
      w: 6 + Math.random() * 9, h: 4 + Math.random() * 6,
      color: petalCols[Math.floor(Math.random() * petalCols.length)],
      life: 1, decay: 0.014 + Math.random() * 0.016, gravity: 0.06, type: 'petal',
    });
  }
}

const fireworks = [];
function spawnFirework() {
  const x = 0.15 + Math.random() * 0.7;
  const y = 0.1 + Math.random() * 0.4;
  const col = confettiColors[Math.floor(Math.random() * confettiColors.length)];
  const count = 28 + Math.floor(Math.random() * 18);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = 2.5 + Math.random() * 3.5;
    fireworks.push({
      x: x * fxC.width, y: y * fxC.height,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      color: col, life: 1, decay: 0.018 + Math.random() * 0.012,
      gravity: 0.04, tail: [],
    });
  }
}

let fwTimer = 0;

function drawFX() {
  fx.clearRect(0, 0, fxC.width, fxC.height);
  fwTimer++;
  if (fwTimer % 110 === 0) spawnFirework();
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const fw = fireworks[i];
    fw.tail.push({x: fw.x, y: fw.y, life: fw.life});
    if (fw.tail.length > 6) fw.tail.shift();
    fw.x += fw.vx; fw.y += fw.vy; fw.vy += fw.gravity;
    fw.vx *= 0.97; fw.vy *= 0.97; fw.life -= fw.decay;
    if (fw.life <= 0) { fireworks.splice(i, 1); continue; }
    for (let j = 0; j < fw.tail.length; j++) {
      const tp = fw.tail[j];
      fx.beginPath(); fx.arc(tp.x, tp.y, 1.5 * (j / fw.tail.length), 0, Math.PI * 2);
      fx.fillStyle = fw.color; fx.globalAlpha = tp.life * (j / fw.tail.length) * 0.5; fx.fill();
    }
    fx.beginPath(); fx.arc(fw.x, fw.y, 2.2, 0, Math.PI * 2);
    fx.fillStyle = fw.color; fx.globalAlpha = fw.life;
    fx.shadowColor = fw.color; fx.shadowBlur = 8; fx.fill();
    fx.shadowBlur = 0; fx.globalAlpha = 1;
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.98;
    p.rot += p.rotV; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    fx.save(); fx.globalAlpha = p.life; fx.translate(p.x, p.y); fx.rotate(p.rot); fx.fillStyle = p.color;
    if (p.type === 'circle') {
      fx.beginPath(); fx.arc(0, 0, p.w / 2, 0, Math.PI * 2); fx.fill();
    } else if (p.type === 'petal') {
      fx.beginPath(); fx.moveTo(0, -p.w);
      fx.bezierCurveTo(p.h*0.7,-p.w*0.7,p.h*0.7,p.w*0.3,0,p.w*0.5);
      fx.bezierCurveTo(-p.h*0.7,p.w*0.3,-p.h*0.7,-p.w*0.7,0,-p.w); fx.fill();
    } else { fx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
    fx.restore();
  }
}

let t = 0;
function loop() { t += 0.01; drawBg(t); drawFX(); requestAnimationFrame(loop); }
loop();

setTimeout(() => {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  spawnConfetti(cx, cy-80, 90, false);
  spawnFirework(); spawnFirework();
}, 400);

document.addEventListener('click', (e) => {
  if (e.target.closest('.wish-btn')) return;
  if (Math.random() > 0.5) spawnPetalBurst(e.clientX, e.clientY);
  else spawnConfetti(e.clientX, e.clientY, 22, true);
});

const wishBtn = document.getElementById('wishBtn');
const wishMsg = document.getElementById('wishMsg');
const wishMessages = [
  'Your wish is on its way to the stars...','The universe heard you, Chrystal!',
  'May all your dreams bloom like flowers...','Wishing you infinite joy and love!'
];
let wishIdx = 0;
wishBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  wishMsg.textContent = wishMessages[wishIdx % wishMessages.length]; wishIdx++;
  wishMsg.classList.add('show');
  for (let i = 0; i < 5; i++) setTimeout(() => spawnFirework(), i * 120);
  const r = wishBtn.getBoundingClientRect();
  spawnConfetti(r.left + r.width/2, r.top, 50, true);
  spawnPetalBurst(r.left + r.width/2, r.top);
  setTimeout(() => wishMsg.classList.remove('show'), 3500);
});

const subtitle = document.getElementById('subtitleEl');
const fullText = 'You deserve to have your wishes come true!';
let charIdx = 0;
const cursor = subtitle.querySelector('.cursor');
function typeChar() {
  if (charIdx < fullText.length) {
    const span = document.createElement('span');
    span.textContent = fullText[charIdx];
    subtitle.insertBefore(span, cursor);
    charIdx++;
    setTimeout(typeChar, 48 + Math.random() * 38);
  }
}
setTimeout(typeChar, 900);
</script>
